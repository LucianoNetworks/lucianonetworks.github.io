<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luely Tecnologia</title>

  <style>
    :root{
      --bg1:#031a2b;
      --bg2:#0c3550;
      --text:#ffffff;
      --muted:#cfd8dc;
      --muted2:#9fb3c8;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px 16px; /* respiro no mobile */
      background:linear-gradient(135deg,var(--bg1),var(--bg2));
      color:var(--text);
      text-align:center;
    }

    .container{
      width:100%;
      max-width:900px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
    }

    /* Logo responsivo */
    .logo{
      width: min(800px, 92vw); /* no desktop mantém grande, no mobile limita pela tela */
      height:auto;
      display:block;
      margin:0 auto 10px;
      object-fit:contain;
    }

    p{
      font-size: clamp(16px, 2.2vw, 22px);
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    strong{
      font-size: clamp(18px, 2.6vw, 26px);
      color: var(--muted2);
      font-weight: 700;
    }

    footer{
      position:fixed;
      left:0;
      right:0;
      bottom:12px;
      text-align:center;
      font-size: 13px;
      color: var(--muted2);
      opacity: .9;
      pointer-events:none;
    }

    /* Ajustes finos pra telas pequenas */
    @media (max-width: 420px){
      body{ padding:18px 12px; }
      footer{ bottom:10px; font-size:12px; }
      .container{ gap:14px; }
    }

    /* Evita footer tapar conteúdo em telas muito baixas */
    @media (max-height: 520px){
      footer{ position:static; margin-top:18px; }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Nota: aqui usei caminho relativo (sem barra inicial) pra não dar dor de cabeça -->
    <img src="images/logo5.png" class="logo" alt="Luely Tecnologia Logo">

    <p>Site em desenvolvimento</p>
    <p><strong>Em breve</strong></p>
  </div>

  <footer>© 2026 Luely Tecnologia</footer>
</body>
</html>
