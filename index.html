<meta charset="UTF-8">

<title>Luely Tecnologia | Desenvolvimento de Software</title>

<style>

:root{
--bg1:#031a2b;
--bg2:#0c3550;
--text:#ffffff;
--muted:#cfd8dc;
--muted2:#9fb3c8;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:24px 16px;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--text);
text-align:center;
}

.container{
width:100%;
max-width:900px;
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

.logo{
width:min(800px,92vw);
height:auto;
display:block;
margin:0 auto 10px;
object-fit:contain;
}

p{
font-size:clamp(16px,2.2vw,22px);
margin:0;
color:var(--muted);
line-height:1.45;
}

strong{
font-size:clamp(18px,2.6vw,26px);
color:var(--muted2);
font-weight:700;
}

footer{
position:fixed;
left:0;
right:0;
bottom:12px;
text-align:center;
font-size:13px;
color:var(--muted2);
opacity:.9;
}

footer a{
color:#9fb3c8;
text-decoration:none;
}

footer a:hover{
text-decoration:underline;
}

@media (max-width:420px){
body{padding:18px 12px;}
footer{bottom:10px;font-size:12px;}
.container{gap:14px;}
}

@media (max-height:520px){
footer{position:static;margin-top:18px;}
}

</style>
