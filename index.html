<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Luely Tecnologia</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .tech {
            color: #38bdf8;
        }

        .soon {
            margin-top: 20px;
            font-size: 24px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo">LUELY <span class="tech">TECNOLOGIA</span></div>
        <div class="soon">Site profissional em desenvolvimento</div>
        <div class="soon">Em breve</div>
    </div>

</body>
</html>
