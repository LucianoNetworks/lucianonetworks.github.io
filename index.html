<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luely Tecnologia</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family: "Segoe UI", Arial, sans-serif;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background: radial-gradient(circle at 70% 70%, #0d2a44, #051321);

color:white;

}

/* container */

.container{

text-align:center;

max-width:900px;

padding:40px;

}

/* logo */

.logo{

width:220px;

margin-bottom:30px;

}

/* titulo */

h1{

font-size:52px;

font-weight:700;

letter-spacing:1px;

}

.brand{

color:#36b5ff;

}

/* subtitulo */

.subtitle{

margin-top:20px;

font-size:20px;

color:#c5d6e5;

}

/* em breve */

.soon{

margin-top:12px;

font-size:26px;

color:#9fb8cc;

font-weight:600;

}

/* responsivo */

@media (max-width:700px){

.logo{
width:160px;
}

h1{
font-size:36px;
}

.subtitle{
font-size:18px;
}

.soon{
font-size:22px;
}

}

</style>

</head>


<body>

<div class="container">

<img src="Images/logo3.png" class="logo" alt="Luely Tecnologia Logo">

<h1>LUELY <span class="brand">TECNOLOGIA</span></h1>

<p class="subtitle">Site profissional em desenvolvimento</p>

<p class="soon">Em breve</p>

</div>

</body>

</html>
